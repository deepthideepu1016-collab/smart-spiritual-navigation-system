<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Girivalayam Auth</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:url("temple.jpg") no-repeat center center fixed;
  background-size:cover;
}

.overlay{
  background:rgba(0,0,0,0.6);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
  text-align:center;
  box-sizing:border-box;
}

h2{
  margin-bottom:25px;
  font-size:35px;
}

input{
  width:100%;
  height:45px;
  padding:0 12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
  box-sizing:border-box;
  outline:none;
  font-size:14px;
}

.password-box{
  position:relative;
  width:100%;
  margin:10px 0;
}

.password-box input{
  padding-right:45px;
}

.password-box span{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  user-select:none;
}

button{
  width:100%;
  height:45px;
  background:orange;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
  margin-top:10px;
  font-size:16px;
}

button:hover{
  background:darkorange;
}

.switch{
  color:blue;
  cursor:pointer;
  margin-top:15px;
  display:block;
}

small{
  display:block;
  text-align:left;
  color:gray;
  font-size:11px;
  margin-top:5px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="overlay">
<div class="box">

<!-- LOGIN FORM -->
<form id="loginForm">

<h2>Login</h2>

<input
id="loginEmail"
type="email"
placeholder="Email"
required>

<div class="password-box">

<input
id="loginPassword"
type="password"
placeholder="Password"
required>

<span onclick="toggleLoginPassword()">👁</span>

</div>

<button type="submit">Login</button>

<span class="switch" onclick="showForgotPassword()">
Forgot Password?
</span>

<span class="switch" onclick="showSignup()">
New user? Signup
</span>

</form>

<!-- SIGNUP -->
<div id="signupBox" style="display:none;">

<h2>Signup</h2>

<input id="name" placeholder="Name">

<input
id="phone"
placeholder="Phone"
maxlength="10"
oninput="validatePhone()">

<input
id="email"
placeholder="Email"
oninput="validateEmail()">

<div class="password-box">

<input
id="password"
type="password"
placeholder="Password"
oninput="validatePassword()">

<span onclick="togglePassword()">👁</span>

</div>

<small>
Must start with CAPITAL letter, include number & symbol
</small>

<button onclick="signup()">Register</button>

<span class="switch" onclick="showLogin()">
Already have account? Login
</span>

</div>

<!-- FORGOT PASSWORD -->
<div id="forgotBox" style="display:none;">

<h2>Reset Password</h2>

<input
id="forgotPhone"
placeholder="Enter Mobile Number">

<input
id="otp"
placeholder="Enter OTP">

<input
id="newPassword"
type="password"
placeholder="New Password">

<button onclick="sendOTP()">
Send OTP
</button>

<button onclick="resetPassword()">
Reset Password
</button>

<span class="switch" onclick="showLogin()">
Back to Login
</span>

</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
