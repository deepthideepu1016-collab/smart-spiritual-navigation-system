<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Girivalayam Auth</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:url("temple.jpg") no-repeat center center fixed;
    background-size:cover;
}
.overlay{
    background:rgba(0,0,0,0.6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:350px;
    text-align:center;
    box-sizing:border-box;
}
h2{
    margin-bottom:25px;
    font-size:35px;
}
input{
    width:100%;
    height:45px;
    padding:0 12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
    outline:none;
    font-size:14px;
}
.password-box{
    position:relative;
    width:100%;
    margin:10px 0;
}
.password-box input{
    padding-right:45px;
}
.password-box span{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
}
button{
    width:100%;
    height:45px;
    background:orange;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
    font-size:16px;
}
button:hover{
    background:darkorange;
}
.switch{
    color:blue;
    cursor:pointer;
    margin-top:15px;
    display:block;
}
small{
    display:block;
    text-align:left;
    color:gray;
    font-size:11px;
    margin-top:5px;
    margin-bottom:10px;
}
.phone-box{
    display:flex;
    align-items:center;
    border:1px solid #ccc;
    border-radius:5px;
    overflow:hidden;
    margin:10px 0;
    height:45px;
}
.country-code{
    width:80px;
    background:#f5f5f5;
    font-weight:bold;
    border-right:1px solid #ccc;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
}
.phone-box input{
    flex:1;
    border:none;
    outline:none;
    padding:0 12px;
    height:100%;
    font-size:14px;
    margin:0;
}
</style>
</head>

<body>

<div class="overlay">
<div class="box">

<form id="loginForm">
    <h2>Login</h2>

    <input id="loginEmail" type="email" placeholder="Email" required>

    <div class="password-box">
        <input id="loginPassword" type="password" placeholder="Password" required>
        <span onclick="toggleLoginPassword()">👁</span>
    </div>

    <button type="submit">Login</button>
    <button type="button" onclick="showForgotPassword()">Forgot Password?</button>
    <button type="button" onclick="showAdminLogin()">Admin Login</button>
    <span class="switch" onclick="showSignup()">New user? Signup</span>
    <div id="adminBox" style="display:none;">
    <h2>Admin Login</h2>

    <input id="adminEmail" type="email" placeholder="Admin Email">

    <div class="password-box">
        <input id="adminPassword" type="password" placeholder="Admin Password">
    </div>

    <button type="button" onclick="adminLogin()">Login as Admin</button>

    <span class="switch" onclick="showLogin()">Back to Login</span>
</div>

    <span class="switch" onclick="showSignup()">New user? Signup</span>
</form>

<div id="signupBox" style="display:none;">
    <h2>Signup</h2>

    <input id="name" placeholder="Name">

    <div class="phone-box">
        <div class="country-code">🇮🇳 +91</div>
        <input id="phone" type="text" placeholder="Enter Mobile Number" maxlength="10" oninput="validatePhone()">
    </div>

    <input id="email" placeholder="Email" oninput="validateEmail()">

    <div class="password-box">
        <input id="password" type="password" placeholder="Password" oninput="validatePassword()">
        <span onclick="togglePassword()">👁</span>
    </div>

    <small>Must start with CAPITAL letter, include number & symbol</small>

    <button type="button" onclick="sendSignupOTP()">Send OTP</button>

    <div id="signupOtpBox" style="display:none;">
        <input id="signupOtp" placeholder="Enter OTP">
        <button type="button" onclick="verifySignupOTP()">Verify OTP</button>
    </div>

    <span class="switch" onclick="showLogin()">Already have account? Login</span>
</div>

<div id="forgotBox" style="display:none;">
    <h2>Reset Password</h2>

    <div id="otpBox">
        <input id="forgotPhone" placeholder="Enter Mobile Number" maxlength="10">

        <button type="button" onclick="sendOTP()">Send OTP by SMS</button>

        <input id="otp" placeholder="Enter OTP">

        <button type="button" onclick="verifyOTP()">Verify OTP</button>
    </div>

    <div id="newPasswordBox" style="display:none;">
        <input id="newPassword" type="password" placeholder="New Password">
        <input id="confirmPassword" type="password" placeholder="Confirm Password">

        <button type="button" onclick="resetPassword()">Set Password</button>
    </div>

    <span class="switch" onclick="showLogin()">Back to Login</span>
</div>

<!-- ================= ADMIN LOGIN ================= -->

<div id="adminBox" style="display:none;">
    <h2>Admin Login</h2>

    <input id="adminEmail" type="email" placeholder="Admin Email">

    <div class="password-box">
        <input id="adminPassword" type="password" placeholder="Admin Password">
    </div>

    <button type="button" onclick="adminLogin()">Login as Admin</button>

    <span class="switch" onclick="showLogin()">Back to Login</span>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
