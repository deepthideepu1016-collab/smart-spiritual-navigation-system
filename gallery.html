<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiruvannamalai Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f3ef;
}

.header{
    background:#2c3e36;
    color:white;
    padding:22px;
    text-align:center;
    font-size:38px;
    font-weight:bold;
}

.back-btn{
    display:inline-block;
    margin:25px 40px 0;
    background:#6b8f5e;
    color:white;
    padding:12px 22px;
    border-radius:25px;
    text-decoration:none;
    font-weight:bold;
}

.gallery-section{
    margin:35px 0 50px;
}

.gallery-title{
    font-size:30px;
    margin-left:40px;
    margin-bottom:20px;
    color:#2c3e36;
}

.slider{
    overflow:hidden;
    padding:10px 0 25px;
}

.slide-track{
    display:flex;
    width:calc(350px * 18);
    animation:scroll 40s linear infinite;
}

.slider:hover .slide-track{
    animation-play-state:paused;
}

.slide{
    width:320px;
    height:220px;
    margin:0 15px;
    border-radius:20px;
    overflow:hidden;
    flex-shrink:0;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s;
}

.slide img:hover{
    transform:scale(1.08);
}

@keyframes scroll{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(calc(-350px * 9));
    }
}
</style>
</head>

<body>

<div class="header">Tiruvannamalai Spiritual Gallery</div>

<a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

<div class="gallery-section">
<h2 class="gallery-title">Temple & Spiritual Places</h2>

<div class="slider">
<div class="slide-track">

<div class="slide"><img src="images/Tiruvunamalaiar-Temple.jpg"></div>

<div class="slide"><img src="images/route-map.jpg"></div>

</div>

</body>
</html>
