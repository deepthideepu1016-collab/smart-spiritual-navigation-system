<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiruvannamalai Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f3ee;
padding:30px;
position:relative;
}

.profile-box{
position:absolute;
top:20px;
right:20px;
background:white;
padding:12px 15px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.profile-logo{
width:45px;
height:45px;
border-radius:50%;
background:orange;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.profile-box h4{
margin:0;
font-size:16px;
}

.profile-box p{
margin:2px 0;
font-size:12px;
color:#555;
}

.dashboard-title{
text-align:center;
font-size:42px;
margin-bottom:40px;
color:#2c3e36;
padding-top:70px;
}

.cards-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
max-width:1600px;
margin:auto;
}

.flip-card{
background:transparent;
height:650px;
perspective:1000px;
}

.flip-card-inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.flip-card:hover .flip-card-inner{
transform:rotateY(180deg);
}

.flip-card-front,
.flip-card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.flip-card-front img{
width:100%;
height:100%;
object-fit:cover;
}

.image-title{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.6);
color:white;
text-align:center;
padding:20px;
font-size:24px;
font-weight:bold;
}

.flip-card-back{
background:white;
transform:rotateY(180deg);
padding:25px;
overflow-y:auto;
}

.flip-card-back h2{
text-align:center;
margin-bottom:25px;
color:#2c3e36;
}

.info-list{
list-style:none;
}

.info-list li{
margin-bottom:18px;
font-size:17px;
line-height:1.6;
display:flex;
align-items:flex-start;
}

.info-list i{
margin-right:12px;
color:#6f9460;
margin-top:4px;
}

.explore-btn{
display:block;
text-align:center;
margin-top:25px;
background:#6f9460;
color:white;
padding:15px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.explore-btn:hover{
background:#56754a;
}

@media(max-width:1000px){
.profile-box{
position:static;
margin-bottom:20px;
}
.cards-container{
grid-template-columns:1fr;
}
.dashboard-title{
padding-top:10px;
}
}
</style>
</head>

<body>

<div class="profile-box">
    <div class="profile-logo">
        <i class="fa-solid fa-user"></i>
    </div>
    <div>
        <h4 id="profileName">User</h4>
        <p id="profilePhone">Phone</p>
        <p id="profileEmail">Email</p>
    </div>
</div>

<h1 class="dashboard-title">
Tiruvannamalai Dashboard
</h1>

<!-- keep your same cards code here exactly -->

<script>
const user = JSON.parse(localStorage.getItem("loggedUser"));

if (user) {
    document.getElementById("profileName").innerText = user.name;
    document.getElementById("profilePhone").innerText = user.phone;
    document.getElementById("profileEmail").innerText = user.email;
} else {
    window.location.href = "auth.html";
}
</script>

</body>
</html>
