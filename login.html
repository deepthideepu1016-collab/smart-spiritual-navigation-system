<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("temple.jpg") no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    background:rgba(0,0,0,0.6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}

/* password wrapper */
.password-box{
    position:relative;
    width:90%;
    margin:auto;
}

/* make input full width inside wrapper */
.password-box input{
    width:100%;
}

/* eye icon fix */
.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
    user-select:none;
}

button{
    width:100%;
    padding:10px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkblue;
}
</style>
</head>

<body>

<div class="overlay">

<div class="box">

<form id="loginForm">

<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email" required>

<div class="password-box">
    <input type="password" id="loginPassword" placeholder="Password" required>
    <span class="eye" onclick="toggleLoginPassword()">👁️</span>
</div>

<button type="submit">Login</button>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
