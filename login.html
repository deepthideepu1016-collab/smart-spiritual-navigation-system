<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay">

<div class="box">

<form id="loginForm">

<h1>Login</h1>

<input type="email" id="loginEmail" placeholder="Email" required>

<div class="password-box">

    <input type="password"
           id="loginPassword"
           placeholder="Password"
           required>

    <span onclick="toggleLoginPassword()" class="eye">👁️</span>

</div>

<button type="submit">Login</button>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
