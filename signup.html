<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - Spiritual App</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("temple.jpg") no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    background:rgba(0,0,0,0.6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
}

.password-box{
    position:relative;
    width:90%;
    margin:auto;
}

.password-box input{
    width:100%;
}

.eye{
    position:absolute;
    right:10px;
    top:18px;
    cursor:pointer;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

a{
    display:block;
    margin-top:10px;
}
.phone-box{
    display:flex;
    align-items:center;
    width:90%;
    margin:8px auto;
    border:1px solid #ccc;
    border-radius:5px;
    overflow:hidden;
    height:42px;
}

.country-code{
    width:70px;
    background:#f5f5f5;
    border-right:1px solid #ccc;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:14px;
}

.phone-box input{
    flex:1;
    border:none;
    outline:none;
    padding:10px;
    margin:0;
    width:auto;
}
</style>
</head>

<body>

<div class="overlay">

<div class="box">

<form id="signupForm">

<h2>Sign Up</h2>

<input type="text" id="name" placeholder="Name" required>

<div class="phone-box">

    <div class="country-code">
        🇮🇳 +91
    </div>

    <input
        type="text"
        id="phone"
        placeholder="Enter Mobile Number"
        maxlength="10"
        oninput="validatePhone()"
        required>

</div>

<input type="email"
       id="email"
       placeholder="Email"
       required>

       <div style="position:relative; width:90%; margin:auto;">

<input type="password"
       id="password"
       placeholder="Password"
       oninput="validatePassword()"
       required
       style="width:100%; padding:10px;">

<span onclick="togglePassword()"
      style="position:absolute; right:10px; top:18px; cursor:pointer; font-size:20px;">
👁️
</span>

</div>
<button type="submit">Create Account</button>

<a href="login.html">Already have account? Login</a>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
