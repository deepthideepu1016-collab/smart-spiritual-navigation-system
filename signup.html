<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup - Spiritual App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("temple.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="box">

        <h2>Sign Up</h2>

        <input type="text" id="name" placeholder="Name">
        <input type="text" id="phone" placeholder="Phone" oninput="validatePhone()">
        <input type="email" id="email" placeholder="Email">
    <div style="position:relative; width:80%; margin:auto;">

        <input type="password" id="password" placeholder="Password"
        oninput="validatePassword()"
        style="width:100%; padding:10px;">

        <span onclick="togglePassword()"
        style="position:absolute; right:10px; top:10px; cursor:pointer;">
        👁
        </span>

    </div>

        <button onclick="signup()">Create Account</button>

        <a href="login.html">Already have account? Login</a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
